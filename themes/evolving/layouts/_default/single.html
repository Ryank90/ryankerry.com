{{ define "main" }}
{{ if eq .Type "page" }}
<article class="post">
    <div class="post-content">
        {{ .Content }}
    </div>
</article>
{{ else }}
<article class="post">
    <h1 class="post-title">{{ .Title }}</h1>
    <div class="post-content">
        {{ .Content }}
    </div>
</article>
{{ end }}
{{ end }}
